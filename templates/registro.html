{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #f8bbd0; border-radius: 10px; background: white;">
    <h2 style="color: #e91e63; text-align: center;">Registro de Usuario</h2>
    <form method="POST">
        <label>Nombre Completo:</label>
        <input type="text" name="nombre" required style="width: 100%; margin-bottom: 15px; padding: 8px;">
        
        <label>Email:</label>
        <input type="email" name="email" required style="width: 100%; margin-bottom: 15px; padding: 8px;">
        
        <label>Contraseña:</label>
        <input type="password" name="password" required style="width: 100%; margin-bottom: 15px; padding: 8px;">
        
        <button type="submit" style="background: #e91e63; color: white; width: 100%; padding: 10px; border: none; border-radius: 5px;">Registrar</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia Sesión</a></p>
</div>
{% endblock %}
