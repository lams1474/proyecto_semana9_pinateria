{% extends 'base.html' %}
{% block content %}
<h2>Lista de Productos</h2>
<table border="1" style="width:100%; text-align:left;">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Acciones</th>
    </tr>
    {% for p in productos %}
    <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.nombre }}</td>
        <td>{{ p.cantidad }}</td>
        <td>${{ p.precio }}</td>
        <td>
            <a href="{{ url_for('editar_producto', id=p.id) }}">Editar</a> |
            <a href="{{ url_for('eliminar_producto', id=p.id) }}" onclick="return confirm('¿Seguro?')">Eliminar</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
