{% extends 'base.html' %}
{% block content %}
<h2>Editar: {{ producto.nombre }}</h2>
<form action="{{ url_for('editar_producto', id=producto.id_producto) }}" method="POST">
    
    <label>Nuevo Stock:</label><br>
    <input type="number" name="stock" value="{{ producto.stock }}" required><br><br>
    
    <label>Nuevo Precio:</label><br>
    <input type="number" step="0.01" name="precio" value="{{ producto.precio }}" required><br><br>
    
    <button type="submit">Actualizar</button>
</form>
{% endblock %}
