{% extends 'base.html' %}

{% block content %}
<h2>Editar Producto</h2>

<form method="POST">
    <p><strong>{{ producto.get_nombre() }}</strong></p>

    <label>Nueva cantidad:</label><br>
    <input type="number" name="cantidad" value="{{ producto.get_cantidad() }}" required><br><br>

    <label>Nuevo precio:</label><br>
    <input type="number" step="0.01" name="precio" value="{{ producto.get_precio() }}" required><br><br>

    <button type="submit">Actualizar</button>
</form>

{% endblock %}
