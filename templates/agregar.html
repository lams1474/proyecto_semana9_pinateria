{% extends 'base.html' %}

{% block title %}Agregar Producto - Piñatería Bryan & Kevin{% endblock %}

{% block content %}
<div class="container">
    <h2>Agregar Nuevo Producto</h2>
    <p>Complete los datos para registrar el producto en MySQL y archivos de persistencia.</p>

    <form action="{{ url_for('agregar_producto') }}" method="POST">
        <label for="id">ID del Producto:</label><br>
        <input type="number" id="id" name="id" placeholder="Ej: 101" required><br><br>

        <label for="nombre">Nombre del Producto:</label><br>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Piñata de Estrella" required><br><br>

        <label for="stock">Stock en Inventario:</label><br>
        <input type="number" id="stock" name="stock" min="0" required><br><br>

        <label for="precio">Precio Unitario ($):</label><br>
        <input type="number" step="0.01" id="precio" name="precio" min="0" required><br><br>

        <button type="submit" class="btn-guardar">Guardar Producto</button>
    </form>
    
    <br>
    <a href="{{ url_for('productos') }}">⬅ Volver a la lista</a>
</div>
{% endblock %}
