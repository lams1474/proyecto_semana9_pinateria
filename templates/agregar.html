{% extends 'base.html' %}
{% block title %}Agregar Producto{% endblock %}
{% block content %}
<div class="container">
    <h2>Agregar Nuevo Producto</h2>
    <form action="{{ url_for('agregar_producto') }}" method="POST">
        <label>ID del Producto:</label><br>
        <input type="number" name="id" required><br><br>

        <label>Nombre del Producto:</label><br>
        <input type="text" name="nombre" required><br><br>

        <label>Cantidad en Inventario:</label><br>
        <input type="number" name="cantidad" min="0" required><br><br>

        <label>Precio Unitario ($):</label><br>
        <input type="number" step="0.01" name="precio" min="0" required><br><br>

        <button type="submit">Guardar Producto</button>
    </form>
    <br>
    <a href="{{ url_for('productos') }}">⬅ Volver a la lista</a>
</div>
{% endblock %}
